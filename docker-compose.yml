services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - hipforge-network
    environment:
      - REDIS_URL=redis://redis:6379
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    networks:
      - hipforge-network

  redis:
    image: redis:7-alpine
    ports:
      - "4444:6379"
    networks:
      - hipforge-network
    volumes:
      - redis_data:/data

  migration-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./workspace:/app/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - hipforge-network
    environment:
      - REDIS_URL=redis://redis:6379
    command: python -m app.workers.migration_worker

volumes:
  redis_data:

networks:
  hipforge-network:
    driver: bridge
